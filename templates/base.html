<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}N 블로그 자동화{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="/static/css/app.css" rel="stylesheet">
</head>
<body>

<!-- 네비게이션 -->
<nav class="navbar navbar-dark sticky-top" style="background:#03C75A;">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-pencil-square me-1"></i>N 블로그 자동화</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.path=='/' %}active{% endif %}" href="/"><i class="bi bi-house me-1"></i>글 생성</a></li>
        <li class="nav-item"><a class="nav-link {% if '/history' in request.path %}active{% endif %}" href="/history"><i class="bi bi-clock-history me-1"></i>글 관리</a></li>
        <li class="nav-item"><a class="nav-link {% if '/settings' in request.path %}active{% endif %}" href="/settings"><i class="bi bi-gear me-1"></i>설정</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- 메인 컨텐츠 -->
<div class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</div>

<!-- 진행상황 토스트 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="progressToast" class="toast align-items-center text-bg-dark" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">처리 중...</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
