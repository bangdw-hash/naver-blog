{% extends "base.html" %}
{% block title %}글 생성 - N 블로그 자동화{% endblock %}
{% block content %}

<div class="row g-3">
<!-- ── 왼쪽: 입력 패널 ── -->
<div class="col-12 col-lg-5">

  <!-- ① 자료 입력 -->
  <div class="card mb-3">
    <div class="card-header d-flex align-items-center">
      <span class="badge bg-success me-2">①</span>
      <strong>자료 입력</strong>
    </div>
    <div class="card-body">
      <textarea id="rawInput" class="form-control mb-2" rows="6"
        placeholder="텍스트, 유튜브 URL, 나의 생각 등을 자유롭게 입력하세요&#10;&#10;예시:&#10;- https://youtube.com/watch?v=xxx&#10;- 오늘 강의에서 인상깊었던 내용: ...&#10;- 학부모들이 많이 묻는 질문: ..."></textarea>

      <!-- 파일 첨부 -->
      <div class="d-flex flex-wrap gap-2 mb-2">
        <label class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-file-earmark-pdf me-1"></i>PDF/파일
          <input type="file" id="fileInput" accept=".pdf,.txt,.md" multiple hidden>
        </label>
        <button class="btn btn-sm btn-outline-secondary" onclick="pasteFromClipboard()">
          <i class="bi bi-clipboard me-1"></i>클립보드 이미지
        </button>
        <button class="btn btn-sm btn-outline-danger" onclick="clearAttachments()">
          <i class="bi bi-trash me-1"></i>초기화
        </button>
      </div>
      <div id="attachList" class="small text-muted"></div>
    </div>
  </div>

  <!-- ② 생성 설정 -->
  <div class="card mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div><span class="badge bg-success me-2">②</span><strong>생성 설정</strong></div>
      <button class="btn btn-sm btn-warning" onclick="updateLogic()">
        <i class="bi bi-arrow-clockwise me-1"></i>블로그 로직 최신화
      </button>
    </div>
    <div class="card-body">
      <div id="logicStatus" class="small text-muted mb-3"></div>

      <div class="mb-2">
        <label class="form-label small fw-bold">어투</label>
        <div class="btn-group w-100" role="group">
          <input type="radio" class="btn-check" name="tone" id="t1" value="전문적">
          <label class="btn btn-outline-secondary btn-sm" for="t1">전문적</label>
          <input type="radio" class="btn-check" name="tone" id="t2" value="친근하게" checked>
          <label class="btn btn-outline-success btn-sm" for="t2">친근하게</label>
          <input type="radio" class="btn-check" name="tone" id="t3" value="감성적">
          <label class="btn btn-outline-secondary btn-sm" for="t3">감성적</label>
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label small fw-bold">이미지 수</label>
        <div class="d-flex align-items-center gap-2">
          <input type="range" class="form-range flex-grow-1" id="imgCount" min="3" max="10" value="5">
          <span class="badge bg-success fs-6" id="imgCountBadge">5장</span>
        </div>
      </div>

      <div class="d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="inclYt" checked>
          <label class="form-check-label small" for="inclYt">유튜브 링크 자동 삽입</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="inclMap">
          <label class="form-check-label small" for="inclMap">지도/위치 포함</label>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ── 오른쪽: 결과 패널 ── -->
<div class="col-12 col-lg-7">

  <!-- ③ 생성 -->
  <div class="card mb-3">
    <div class="card-header"><span class="badge bg-success me-2">③</span><strong>글 생성 & 미리보기</strong></div>
    <div class="card-body">

      <!-- 생성 버튼 -->
      <div class="d-flex gap-2 mb-3">
        <button class="btn btn-success flex-grow-1" onclick="generateContent()">
          <i class="bi bi-robot me-1"></i>AI 글 생성
        </button>
      </div>
      <div id="genProgress" class="progress mb-2" style="display:none;height:6px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-success w-100"></div>
      </div>
      <div id="genStatus" class="small text-muted mb-2"></div>

      <!-- 제목 -->
      <label class="form-label small fw-bold">제목</label>
      <input type="text" id="postTitle" class="form-control mb-2" placeholder="AI 생성 후 표시됩니다">

      <!-- 본문 -->
      <label class="form-label small fw-bold">본문 <span class="text-muted">(직접 편집 가능 · [이미지:설명] = 삽입 위치)</span></label>
      <textarea id="postContent" class="form-control mb-2" rows="10"
        placeholder="← AI 글 생성 버튼을 눌러주세요"></textarea>

      <!-- 태그 -->
      <label class="form-label small fw-bold">태그</label>
      <input type="text" id="postTags" class="form-control mb-3" placeholder="태그1, 태그2, ...">

      <!-- 보완 요청 -->
      <div class="alert alert-warning py-2 mb-2">
        <label class="form-label small fw-bold mb-1"><i class="bi bi-pencil me-1"></i>보완 요청 내용 (재생성에 반영)</label>
        <textarea id="supplement" class="form-control" rows="2"
          placeholder="예: 더 구체적인 예시를 추가해줘 / 도입부를 더 감성적으로 / 3번 항목을 더 자세히"></textarea>
      </div>

      <!-- 재생성 / 확정 버튼 -->
      <div class="d-flex gap-2">
        <button class="btn btn-warning flex-grow-1" id="btnRegen" onclick="regenerate()" disabled>
          <i class="bi bi-arrow-counterclockwise me-1"></i>보완 반영 재생성
        </button>
        <button class="btn btn-primary flex-grow-1" id="btnConfirm" onclick="confirmPost()" disabled>
          <i class="bi bi-check-circle me-1"></i>확정
        </button>
      </div>
    </div>
  </div>

  <!-- ④ 이미지 생성 -->
  <div class="card mb-3" id="imageSection" style="opacity:0.5;pointer-events:none;">
    <div class="card-header"><span class="badge bg-primary me-2">④</span><strong>이미지 생성 (DALL-E 3)</strong></div>
    <div class="card-body">
      <div class="mb-2">
        <label class="form-label small fw-bold">저장 경로</label>
        <div class="input-group input-group-sm">
          <input type="text" id="imageSavePath" class="form-control"
            value="{{ config.get('IMAGE_DIR','./uploads/images') if config is defined else './uploads/images' }}">
          <span class="input-group-text"><i class="bi bi-folder2"></i></span>
        </div>
        <div class="form-text">모바일: /storage/emulated/0/Download/blog_images 형태로 입력</div>
      </div>
      <button class="btn btn-primary w-100 mb-3" onclick="generateImages()">
        <i class="bi bi-image me-1"></i>이미지 생성 시작
      </button>
      <div id="imgProgress" class="progress mb-2" style="display:none;height:6px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary w-100"></div>
      </div>
      <div id="imgStatus" class="small text-muted mb-2"></div>
      <div id="imgThumbnails" class="d-flex flex-wrap gap-2"></div>
    </div>
  </div>

  <!-- ⑤ 최종 저장 & 포스팅 -->
  <div class="card" id="exportSection" style="opacity:0.5;pointer-events:none;">
    <div class="card-header"><span class="badge bg-dark me-2">⑤</span><strong>최종 저장 & 포스팅</strong></div>
    <div class="card-body">
      <div class="mb-2">
        <label class="form-label small fw-bold">저장 폴더</label>
        <div class="input-group input-group-sm">
          <input type="text" id="exportPath" class="form-control" value="./uploads">
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-dark flex-grow-1" onclick="exportTxt()">
          <i class="bi bi-file-text me-1"></i>TXT 저장
        </button>
        <button class="btn btn-danger flex-grow-1" onclick="postToNaver()">
          <i class="bi bi-send me-1"></i>네이버 포스팅
        </button>
      </div>
      <div id="postStatus" class="small text-muted mt-2"></div>
    </div>
  </div>

</div>
</div>

<!-- 히든 데이터 -->
<input type="hidden" id="currentPostId" value="">
<input type="hidden" id="currentJobId" value="">

{% endblock %}

{% block scripts %}
<script>
// 이미지 슬라이더
document.getElementById('imgCount').addEventListener('input', function(){
  document.getElementById('imgCountBadge').textContent = this.value + '장';
});

// 첨부 파일 목록
let attachedFiles = [];
document.getElementById('fileInput').addEventListener('change', async function(){
  for(const file of this.files){
    const fd = new FormData();
    fd.append('file', file);
    const res = await fetch('/api/upload', {method:'POST', body:fd});
    const data = await res.json();
    attachedFiles.push(data);
    updateAttachList();
  }
});

function updateAttachList(){
  const el = document.getElementById('attachList');
  if(!attachedFiles.length){ el.textContent='첨부 없음'; return; }
  el.innerHTML = attachedFiles.map(f=>
    `<span class="badge bg-secondary me-1"><i class="bi bi-paperclip me-1"></i>${f.name}</span>`
  ).join('');
}

function clearAttachments(){ attachedFiles=[]; updateAttachList(); }

async function pasteFromClipboard(){
  try{
    const items = await navigator.clipboard.read();
    for(const item of items){
      if(item.types.includes('image/png')||item.types.includes('image/jpeg')){
        const blob = await item.getType(item.types.find(t=>t.startsWith('image/')));
        const fd = new FormData();
        fd.append('file', blob, 'clipboard.png');
        const res = await fetch('/api/upload',{method:'POST',body:fd});
        const data = await res.json();
        attachedFiles.push({...data, type:'image'});
        updateAttachList();
        return;
      }
    }
    alert('클립보드에 이미지가 없습니다.');
  }catch(e){ alert('클립보드 접근 오류: '+e.message); }
}
</script>
{% endblock %}
